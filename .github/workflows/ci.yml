name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend tests (Jest)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_FILE: jest-results.xml

      - name: Publish frontend test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend (Jest)
          path: frontend/jest-results.xml
          reporter: jest-junit

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-summary
          path: frontend/coverage/coverage-summary.json

  test-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload E2E results summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: frontend/e2e-results.json

  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --tb=short --junitxml=pytest-results.xml
        env:
          JWT_SECRET: ci-test-secret
          ANTHROPIC_API_KEY: dummy-for-tests

      - name: Publish backend test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend (pytest)
          path: backend/pytest-results.xml
          reporter: java-junit

      - name: Extract coverage numbers
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          lines = float(root.get("line-rate", 0)) * 100
          branches = float(root.get("branch-rate", 0)) * 100
          with open("coverage-numbers.txt", "w") as f:
              f.write(f"{lines:.1f}\n{branches:.1f}\n")
          EOF

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-summary
          path: backend/coverage-numbers.txt

  coverage-comment:
    name: Post coverage comment
    needs: [test-frontend, test-backend, test-e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-summary
          path: frontend-summary

      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage-summary
          path: backend-summary

      - uses: actions/download-artifact@v4
        with:
          name: e2e-results
          path: e2e-summary

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── Unit coverage (Jest) ────────────────────────────────────────
            const fe = JSON.parse(fs.readFileSync('frontend-summary/coverage-summary.json', 'utf8')).total;

            // ── Unit coverage (pytest) ──────────────────────────────────────
            const [beLines, beBranches] = fs.readFileSync('backend-summary/coverage-numbers.txt', 'utf8').trim().split('\n');

            // ── E2E results (Playwright) ────────────────────────────────────
            let e2eLine = 'E2E results unavailable';
            try {
              const e2e = JSON.parse(fs.readFileSync('e2e-summary/e2e-results.json', 'utf8'));
              const s = e2e.stats || {};
              const passed = s.expected ?? 0;
              const failed = s.unexpected ?? 0;
              const flaky = s.flaky ?? 0;
              const skipped = s.skipped ?? 0;
              const total = passed + failed + flaky + skipped;
              const icon = failed > 0 ? '❌' : flaky > 0 ? '⚠️' : '✅';
              e2eLine = `${icon} **${passed} / ${total}** passed`;
              if (failed > 0) e2eLine += ` · ${failed} failed`;
              if (flaky > 0) e2eLine += ` · ${flaky} flaky`;
              if (skipped > 0) e2eLine += ` · ${skipped} skipped`;
              if (s.duration) e2eLine += ` · ${(s.duration / 1000).toFixed(1)}s`;
            } catch (e) {
              core.warning(`Could not parse E2E results: ${e.message}`);
            }

            const pct = (v) => `${v}%`;
            const body = [
              '## Coverage Report',
              '',
              '### Unit test coverage',
              '',
              '| | Statements | Branches | Functions | Lines |',
              '|---|---|---|---|---|',
              `| **Frontend (Jest)** | ${pct(fe.statements.pct)} | ${pct(fe.branches.pct)} | ${pct(fe.functions.pct)} | ${pct(fe.lines.pct)} |`,
              `| **Backend (pytest)** | — | ${beBranches}% | — | ${beLines}% |`,
              '',
              '### E2E user flows (Playwright)',
              '',
              e2eLine,
              '',
              '_Updated on every push to this PR. E2E tests verify real user flows in a browser — they complement unit coverage rather than overlap with it._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  docker-build:
    name: Verify Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
