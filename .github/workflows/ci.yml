name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend tests (Jest)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_FILE: jest-results.xml

      - name: Publish frontend test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend (Jest)
          path: frontend/jest-results.xml
          reporter: jest-junit

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-summary
          path: frontend/coverage/coverage-summary.json

      # `next dev` is lenient about TypeScript errors and skips the strict
      # type-check that `next build` runs. Without this step, things like
      # "regex flag requires es2018+" or stale imports only fail when Vercel
      # tries to build, after the PR has already merged. Run the same
      # invocation Vercel runs so we catch it before merge instead.
      - name: Verify Next.js production build
        if: always()
        run: npm run build
        env:
          # next-auth v5 validates config at module load. Provide throwaway
          # values so the build can boot the auth() factory without crashing.
          AUTH_SECRET: ci-build-dummy-secret-do-not-use-in-prod
          AUTH_GOOGLE_ID: ci-build-dummy-id
          AUTH_GOOGLE_SECRET: ci-build-dummy-secret
          NEXT_PUBLIC_API_URL: http://stub.test/api

  test-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload E2E results summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: frontend/e2e-results.json

      - name: Upload E2E coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-coverage-summary
          path: frontend/coverage-e2e/coverage-summary.json

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      # Retries are kept at 2 to absorb genuine infra blips (cold dev server,
      # network timeouts, etc.), but a flake that recovers on retry is almost
      # always a real bug — an ambiguous selector, a race, or timing drift.
      # Fail the job so flakes can't silently ship to main via auto-merge.
      - name: Fail if any E2E test was flaky
        if: always()
        run: |
          node -e '
            const fs = require("fs");
            let r;
            try { r = JSON.parse(fs.readFileSync("e2e-results.json", "utf8")); }
            catch (e) { console.error("Could not read e2e-results.json:", e.message); process.exit(0); }
            const flaky = (r.stats && r.stats.flaky) || 0;
            if (flaky === 0) { console.log("✓ No flakes detected."); process.exit(0); }
            console.error(`::error::${flaky} E2E test(s) were flaky. Flakes must be fixed before merging.`);
            // Walk the suite tree to print flaky test titles
            const flakyTitles = [];
            const walk = (suite, path = "") => {
              for (const spec of (suite.specs || [])) {
                for (const t of (spec.tests || [])) {
                  const statuses = (t.results || []).map(x => x.status);
                  const hadFail = statuses.includes("failed") || statuses.includes("timedOut");
                  const hadPass = statuses.includes("passed");
                  if (hadFail && hadPass) flakyTitles.push(`${path}${spec.title}`);
                }
              }
              for (const sub of (suite.suites || [])) walk(sub, path + (suite.title ? suite.title + " > " : ""));
            };
            for (const suite of (r.suites || [])) walk(suite);
            if (flakyTitles.length) {
              console.error("Flaky tests:");
              for (const t of flakyTitles) console.error("  - " + t);
            }
            process.exit(1);
          '

  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --tb=short --junitxml=pytest-results.xml
        env:
          JWT_SECRET: ci-test-secret
          ANTHROPIC_API_KEY: dummy-for-tests

      - name: Publish backend test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend (pytest)
          path: backend/pytest-results.xml
          reporter: java-junit

      - name: Extract coverage numbers
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          lines = float(root.get("line-rate", 0)) * 100
          branches = float(root.get("branch-rate", 0)) * 100
          with open("coverage-numbers.txt", "w") as f:
              f.write(f"{lines:.1f}\n{branches:.1f}\n")
          EOF

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-summary
          path: backend/coverage-numbers.txt

  coverage-comment:
    name: Post coverage comment
    needs: [test-frontend, test-backend, test-e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-summary
          path: frontend-summary

      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage-summary
          path: backend-summary

      - uses: actions/download-artifact@v4
        with:
          name: e2e-results
          path: e2e-summary

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: e2e-coverage-summary
          path: e2e-coverage-summary

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── Unit coverage (Jest) ────────────────────────────────────────
            const fe = JSON.parse(fs.readFileSync('frontend-summary/coverage-summary.json', 'utf8')).total;

            // ── E2E coverage (Istanbul via babel-plugin-istanbul) ───────────
            let e2eCov = null;
            try {
              e2eCov = JSON.parse(fs.readFileSync('e2e-coverage-summary/coverage-summary.json', 'utf8')).total;
            } catch { /* no E2E coverage data */ }

            // ── Combined frontend coverage (max of Jest and E2E per metric) ─
            const combine = (jestMetric, e2eMetric) => {
              if (!e2eCov) return jestMetric.pct;
              // Approximate: take the higher of the two since they cover different paths
              return Math.min(100, Math.max(jestMetric.pct, e2eMetric.pct)).toFixed(2);
            };
            const combined = e2eCov ? {
              statements: combine(fe.statements, e2eCov.statements),
              branches: combine(fe.branches, e2eCov.branches),
              functions: combine(fe.functions, e2eCov.functions),
              lines: combine(fe.lines, e2eCov.lines),
            } : null;

            // ── Unit coverage (pytest) ──────────────────────────────────────
            const [beLines, beBranches] = fs.readFileSync('backend-summary/coverage-numbers.txt', 'utf8').trim().split('\n');

            // ── E2E results (Playwright) ────────────────────────────────────
            let e2eLine = 'E2E results unavailable';
            try {
              const e2e = JSON.parse(fs.readFileSync('e2e-summary/e2e-results.json', 'utf8'));
              const s = e2e.stats || {};
              const passed = s.expected ?? 0;
              const failed = s.unexpected ?? 0;
              const flaky = s.flaky ?? 0;
              const skipped = s.skipped ?? 0;
              const total = passed + failed + flaky + skipped;
              const icon = failed > 0 ? '❌' : flaky > 0 ? '⚠️' : '✅';
              e2eLine = `${icon} **${passed} / ${total}** passed`;
              if (failed > 0) e2eLine += ` · ${failed} failed`;
              if (flaky > 0) e2eLine += ` · ${flaky} flaky`;
              if (skipped > 0) e2eLine += ` · ${skipped} skipped`;
              if (s.duration) e2eLine += ` · ${(s.duration / 1000).toFixed(1)}s`;
            } catch (e) {
              core.warning(`Could not parse E2E results: ${e.message}`);
            }

            const pct = (v) => `${v}%`;
            const rows = [
              `| **Frontend (Jest)** | ${pct(fe.statements.pct)} | ${pct(fe.branches.pct)} | ${pct(fe.functions.pct)} | ${pct(fe.lines.pct)} |`,
            ];
            if (e2eCov) {
              rows.push(`| **Frontend (E2E)** | ${pct(e2eCov.statements.pct)} | ${pct(e2eCov.branches.pct)} | ${pct(e2eCov.functions.pct)} | ${pct(e2eCov.lines.pct)} |`);
              rows.push(`| **Frontend (combined)** | ${combined.statements}% | ${combined.branches}% | ${combined.functions}% | ${combined.lines}% |`);
            }
            rows.push(`| **Backend (pytest)** | — | ${beBranches}% | — | ${beLines}% |`);

            const body = [
              '## Coverage Report',
              '',
              '### Code coverage',
              '',
              '| | Statements | Branches | Functions | Lines |',
              '|---|---|---|---|---|',
              ...rows,
              '',
              '### E2E user flows (Playwright)',
              '',
              e2eLine,
              '',
              '_Updated on every push to this PR._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  docker-build:
    name: Verify Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          # Match Railway's default build context (repo root). The Dockerfile
          # at backend/Dockerfile uses COPY backend/... paths because the
          # build context is the repo root, not backend/. Building with
          # context: backend instead would silently work for the wrong reason
          # and let real Railway-breaking changes pass CI.
          context: .
          file: backend/Dockerfile
          push: false
