name: Docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'reports/**'
      - 'backend/scripts/**'
      - 'backend/migrations/**'
      - 'CLAUDE.md'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed by mkdocs-git-revision-date-localized.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Regenerate auto pages
        # Scripts reference / Reports index / Design-doc index / Migration
        # index are derived from sources in the repo. Regenerate in CI so
        # main always ships the latest content even if a PR forgot to rerun
        # the generator locally.
        run: python -m backend.scripts.generate_docs

      - name: Build site
        # --strict turns warnings (broken links, missing nav entries) into
        # build failures so we don't ship broken pages silently.
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
